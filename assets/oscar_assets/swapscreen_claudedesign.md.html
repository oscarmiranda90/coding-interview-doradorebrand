<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorado — Swap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0e0e0e; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "cardBorderColor": "#0a0a0a",
  "cardShadowColor": "#E9FF47",
  "accentColor": "#E9FF47"
}/*EDITMODE-END*/;

const YELLOW = '#E9FF47';
const BLACK = '#0a0a0a';
const WHITE = '#FAFAF5';

const currencies = [
  { code: 'USDT', name: 'Tether USD', type: 'crypto' },
  { code: 'VES', name: 'Bolívar', type: 'fiat' },
  { code: 'BTC', name: 'Bitcoin', type: 'crypto' },
  { code: 'USD', name: 'Dólar', type: 'fiat' },
  { code: 'ETH', name: 'Ethereum', type: 'crypto' },
  { code: 'COP', name: 'Peso Col.', type: 'fiat' },
];

const rates = { USDT_VES: 49.82, USDT_BTC: 0.0000152, USDT_USD: 1.0, USDT_ETH: 0.000312, USDT_COP: 4122.5, VES_USDT: 0.0201, BTC_USDT: 65800, ETH_USDT: 3205, USD_USDT: 1.0, COP_USDT: 0.000243 };
function getRate(from, to) {
  if (from === to) return 1;
  const key = `${from}_${to}`;
  if (rates[key]) return rates[key];
  const inv = `${to}_${from}`;
  if (rates[inv]) return 1 / rates[inv];
  const toUSDT = rates[`${from}_USDT`] || (rates[`USDT_${from}`] ? 1/rates[`USDT_${from}`] : null);
  const fromUSDT = rates[`USDT_${to}`] || (rates[`${to}_USDT`] ? 1/rates[`${to}_USDT`] : null);
  if (toUSDT && fromUSDT) return toUSDT * fromUSDT;
  return 1;
}

function CurrencyPicker({ value, onChange, exclude, barMode, align }) {
  const [open, setOpen] = useState(false);
  if (barMode) {
    return (
      <div style={{ position: 'relative' }}>
        <button onClick={() => setOpen(o => !o)} style={{
          display: 'flex', alignItems: 'center', gap: 6, background: 'transparent',
          border: 'none', padding: '8px 16px', width: '100%',
          fontFamily: 'Space Grotesk', fontWeight: 800, fontSize: 18, cursor: 'pointer',
          color: BLACK, justifyContent: align === 'right' ? 'flex-end' : 'flex-start',
        }}>
          {value}
          <svg width="10" height="7" viewBox="0 0 12 8" fill="none"><path d="M1 1L6 7L11 1" stroke={BLACK} strokeWidth="2.5" strokeLinecap="round"/></svg>
        </button>
        {open && (
          <div style={{
            position: 'absolute', top: '110%', [align === 'right' ? 'right' : 'left']: 0, zIndex: 100,
            background: WHITE, border: `2.5px solid ${BLACK}`,
            boxShadow: `5px 5px 0 ${BLACK}`, minWidth: 140, borderRadius: 12, overflow: 'hidden',
          }}>
            {currencies.filter(c => c.code !== exclude).map(c => (
              <div key={c.code} onClick={() => { onChange(c.code); setOpen(false); }} style={{
                padding: '10px 14px', cursor: 'pointer', fontWeight: 700, fontSize: 15,
                fontFamily: 'Space Grotesk', color: BLACK, display: 'flex', justifyContent: 'space-between',
                alignItems: 'center', borderBottom: `1.5px solid rgba(0,0,0,0.08)`,
                background: c.code === value ? YELLOW : 'transparent',
              }}
              onMouseEnter={e => e.currentTarget.style.background = c.code === value ? YELLOW : '#f0f0e8'}
              onMouseLeave={e => e.currentTarget.style.background = c.code === value ? YELLOW : 'transparent'}
              >
                <span>{c.code}</span>
                <span style={{ fontSize: 11, opacity: 0.5, fontWeight: 500 }}>{c.type}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }
  return (
    <div style={{ position: 'relative' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        display: 'flex', alignItems: 'center', gap: 6, background: WHITE,
        border: `2.5px solid ${BLACK}`, borderRadius: 12, padding: '10px 14px',
        fontFamily: 'Space Grotesk', fontWeight: 800, fontSize: 18, cursor: 'pointer',
        boxShadow: `3px 3px 0 ${BLACK}`, letterSpacing: '0.02em', color: BLACK,
        transition: 'box-shadow 0.1s, transform 0.1s', minWidth: 110,
      }}
      onMouseDown={e => e.currentTarget.style.boxShadow = '1px 1px 0 ' + BLACK}
      onMouseUp={e => e.currentTarget.style.boxShadow = '3px 3px 0 ' + BLACK}
      >
        {value}
        <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1L6 7L11 1" stroke={BLACK} strokeWidth="2.5" strokeLinecap="round"/></svg>
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: '110%', left: 0, zIndex: 100,
          background: WHITE, border: `2.5px solid ${BLACK}`,
          boxShadow: `5px 5px 0 ${BLACK}`, minWidth: 140, borderRadius: 12, overflow: 'hidden',
        }}>
          {currencies.filter(c => c.code !== exclude).map(c => (
            <div key={c.code} onClick={() => { onChange(c.code); setOpen(false); }} style={{
              padding: '10px 14px', cursor: 'pointer', fontWeight: 700, fontSize: 15,
              fontFamily: 'Space Grotesk', color: BLACK, display: 'flex', justifyContent: 'space-between',
              alignItems: 'center', borderBottom: `1.5px solid rgba(0,0,0,0.1)`,
              background: c.code === value ? YELLOW : 'transparent',
            }}
            onMouseEnter={e => e.currentTarget.style.background = c.code === value ? YELLOW : '#f0f0e8'}
            onMouseLeave={e => e.currentTarget.style.background = c.code === value ? YELLOW : 'transparent'}
            >
              <span>{c.code}</span>
              <span style={{ fontSize: 11, opacity: 0.5, fontWeight: 500 }}>{c.type}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SwapApp({ tweaks = TWEAK_DEFAULTS }) {
  const [fromCur, setFromCur] = useState('USDT');
  const [toCur, setToCur] = useState('VES');
  const [amount, setAmount] = useState('');
  const [swapping, setSwapping] = useState(false);
  const [flipped, setFlipped] = useState(false);
  const [done, setDone] = useState(false);
  const [rotating, setRotating] = useState(false);

  const rate = getRate(fromCur, toCur);
  const receives = amount ? (parseFloat(amount) * rate).toLocaleString('es-VE', { maximumFractionDigits: 4 }) : '—';

  function handleSwapCurrencies() {
    setRotating(true);
    setTimeout(() => {
      setFromCur(toCur);
      setToCur(fromCur);
      setRotating(false);
    }, 220);
  }

  function handleCambiar() {
    if (!amount || parseFloat(amount) <= 0) return;
    setSwapping(true);
    setTimeout(() => { setSwapping(false); setDone(true); setTimeout(() => setDone(false), 2200); }, 1800);
  }

  const rateStr = rate < 0.001
    ? `1 ${fromCur} = ${rate.toFixed(8)} ${toCur}`
    : rate > 1000
    ? `1 ${fromCur} = ${rate.toLocaleString('es-VE', { maximumFractionDigits: 2 })} ${toCur}`
    : `1 ${fromCur} = ${rate.toFixed(4)} ${toCur}`;

  return (
    <div style={{
      width: '100%', height: '100%', background: BLACK,
      display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden',
    }}>
      {/* Texture overlay */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0,
        backgroundImage: `repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(233,255,71,0.04) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(233,255,71,0.04) 40px)`,
      }}></div>

      {/* Header */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '16px 20px 12px', position: 'relative', zIndex: 1,
      }}>
        {/* Logo */}
        <div style={{
          width: 44, height: 44, background: YELLOW, border: `2.5px solid ${BLACK}`,
          boxShadow: `3px 3px 0 ${YELLOW}80`, display: 'flex', alignItems: 'center', justifyContent: 'center',
          borderRadius: 12,
        }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="0" stroke={BLACK} strokeWidth="2.5"/>
            <path d="M7 8h4M7 12h10M7 16h6" stroke={BLACK} strokeWidth="2.5" strokeLinecap="square"/>
          </svg>
        </div>

        {/* Title */}
        <div style={{ fontFamily: 'Space Mono', fontWeight: 700, fontSize: 13, color: WHITE, letterSpacing: '0.15em', opacity: 0.7 }}>
          INTERCAMBIO
        </div>

        {/* Avatar */}
        <div style={{
          width: 44, height: 44, border: `2.5px solid rgba(255,255,255,0.2)`,
          borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: 'rgba(255,255,255,0.06)',
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke={WHITE} strokeWidth="2"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke={WHITE} strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '0 16px 40px', position: 'relative', zIndex: 1 }}>

        {/* Swap card */}
        <div style={{
          background: WHITE, border: `3px solid ${tweaks.cardBorderColor}`,
          boxShadow: `6px 6px 0 ${tweaks.cardShadowColor}`,
          padding: 0, overflow: 'visible', borderRadius: 20,
        }}>

          {/* Card header bar */}
          <div style={{
            background: YELLOW, padding: '10px 20px', borderBottom: `3px solid ${BLACK}`,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            borderRadius: '17px 17px 0 0',
          }}>
            <span style={{ fontFamily: 'Space Mono', fontWeight: 700, fontSize: 11, letterSpacing: '0.12em', color: BLACK }}>INTERCAMBIO CRIPTO</span>
            <div style={{ display: 'flex', gap: 4 }}>
              {[...Array(3)].map((_, i) => <div key={i} style={{ width: 7, height: 7, background: BLACK, borderRadius: '50%' }}></div>)}
            </div>
          </div>

          <div style={{ padding: '20px 20px 0', overflow: 'visible' }}>

            {/* Currency row — single unified bar */}
            <div style={{ marginBottom: 28, overflow: 'visible', paddingTop: 12, paddingBottom: 12 }}>
              <div style={{ display: 'flex', marginBottom: 8 }}>
                <div style={{ flex: 1, fontFamily: 'Space Mono', fontSize: 10, fontWeight: 700, color: BLACK, opacity: 0.5, letterSpacing: '0.12em' }}>TENGO</div>
                <div style={{ flex: 1, fontFamily: 'Space Mono', fontSize: 10, fontWeight: 700, color: BLACK, opacity: 0.5, letterSpacing: '0.12em', textAlign: 'right' }}>QUIERO</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', border: `2.5px solid ${BLACK}`, borderRadius: 14, background: '#f5f5ee', boxShadow: `3px 3px 0 ${BLACK}`, position: 'relative', height: 34, overflow: 'visible' }}>
                <div style={{ flex: 1, position: 'relative', zIndex: 5 }}>
                  <CurrencyPicker value={fromCur} onChange={setFromCur} exclude={toCur} barMode />
                </div>
                {/* invisible center gap for the floating button */}
                <div style={{ width: 56, flexShrink: 0 }}></div>
                <div style={{ flex: 1, position: 'relative', zIndex: 5 }}>
                  <CurrencyPicker value={toCur} onChange={setToCur} exclude={fromCur} barMode align="right" />
                </div>
                {/* Circle swap button — centered, overflows top and bottom */}
                <button onClick={handleSwapCurrencies} style={{
                  width: 56, height: 56, borderRadius: '50%', background: BLACK,
                  border: `2.5px solid ${BLACK}`, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  position: 'absolute', left: '50%', top: '50%',
                  transform: `translate(-50%, -50%) rotate(${rotating ? 180 : 0}deg)`,
                  zIndex: 10,
                  boxShadow: `2px 2px 0 ${YELLOW}`,
                  transition: 'transform 0.22s',
                }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M7 16L3 12L7 8" stroke={YELLOW} strokeWidth="2.5" strokeLinecap="square" strokeLinejoin="miter"/>
                    <path d="M3 12H14" stroke={YELLOW} strokeWidth="2.5" strokeLinecap="square"/>
                    <path d="M17 8L21 12L17 16" stroke={YELLOW} strokeWidth="2.5" strokeLinecap="square" strokeLinejoin="miter"/>
                    <path d="M21 12H10" stroke={YELLOW} strokeWidth="2.5" strokeLinecap="square"/>
                  </svg>
                </button>
              </div>
            </div>

            {/* Amount input */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: 'Space Mono', fontSize: 10, fontWeight: 700, color: BLACK, opacity: 0.5, letterSpacing: '0.12em', marginBottom: 8 }}>MONTO A ENVIAR</div>
              <div style={{ position: 'relative' }}>
                <input
                  type="number"
                  placeholder="0.00"
                  value={amount}
                  onChange={e => setAmount(e.target.value)}
                  style={{
                    width: '100%', padding: '14px 70px 14px 16px',
                    border: `2.5px solid ${BLACK}`, borderRadius: 12,
                    fontFamily: 'Space Mono', fontSize: 22, fontWeight: 700, color: BLACK,
                    background: '#f5f5ee', outline: 'none',
                    boxShadow: 'inset 2px 2px 0 rgba(0,0,0,0.07)',
                  }}
                />
                <span style={{
                  position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)',
                  fontFamily: 'Space Mono', fontWeight: 700, fontSize: 13, color: BLACK, opacity: 0.5,
                }}>{fromCur}</span>
              </div>
            </div>

            {/* Rate info */}
            <div style={{
              background: '#0a0a0a', border: `2.5px solid ${BLACK}`,
              padding: '14px 16px', marginBottom: 20, borderRadius: 12,
            }}>
              {[
                ['TASA ESTIMADA', rateStr],
                ['RECIBIRÁS', amount ? `${receives} ${toCur}` : `— ${toCur}`],
                ['TIEMPO ESTIMADO', '~2 min'],
              ].map(([label, val]) => (
                <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: label === 'TIEMPO ESTIMADO' ? 0 : 10 }}>
                  <span style={{ fontFamily: 'Space Mono', fontSize: 10, color: 'rgba(255,255,255,0.45)', letterSpacing: '0.1em' }}>{label}</span>
                  <span style={{ fontFamily: 'Space Grotesk', fontSize: 13, fontWeight: 700, color: WHITE, letterSpacing: '0.02em' }}>{val}</span>
                </div>
              ))}
            </div>

          </div>

          {/* CTA Button */}
          <button onClick={handleCambiar} style={{
            width: '100%', padding: '18px', background: done ? '#4ade80' : swapping ? '#666' : YELLOW,
            border: 'none', borderTop: `3px solid ${BLACK}`, borderRadius: '0 0 17px 17px',
            fontFamily: 'Space Mono', fontWeight: 700, fontSize: 15, letterSpacing: '0.15em',
            color: done ? WHITE : BLACK, cursor: 'pointer', display: 'flex', alignItems: 'center',
            justifyContent: 'center', gap: 10,
            transition: 'background 0.3s',
          }}>
            {done ? (
              <>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12L10 17L19 7" stroke="white" strokeWidth="3" strokeLinecap="square"/></svg>
                CONFIRMADO
              </>
            ) : swapping ? (
              <>
                <SwapSpinner />
                PROCESANDO...
              </>
            ) : 'CAMBIAR →'}
          </button>
        </div>

        {/* Bottom note */}
        <div style={{ marginTop: 16, textAlign: 'center' }}>
          <span style={{ fontFamily: 'Space Mono', fontSize: 10, color: 'rgba(255,255,255,0.3)', letterSpacing: '0.08em' }}>
            COMISIÓN 0.5% · RED SEGURA
          </span>
        </div>
      </div>
    </div>
  );
}

function SwapSpinner() {
  const [angle, setAngle] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setAngle(a => a + 30), 100);
    return () => clearInterval(id);
  }, []);
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" style={{ transform: `rotate(${angle}deg)` }}>
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke={BLACK} strokeWidth="2.5" strokeLinecap="square"/>
    </svg>
  );
}

function App() {
  const { tweaks, setTweak, panelVisible } = useTweaks(TWEAK_DEFAULTS);
  return (
    <div style={{ position: 'relative' }}>
      <IOSDevice statusBarDark={true}>
        <SwapApp tweaks={tweaks} />
      </IOSDevice>
      {panelVisible && (
        <TweaksPanel onClose={() => window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*')}>
          <TweakSection title="Card">
            <TweakColor label="Border Color" value={tweaks.cardBorderColor} onChange={v => setTweak('cardBorderColor', v)} />
            <TweakColor label="Shadow Color" value={tweaks.cardShadowColor} onChange={v => setTweak('cardShadowColor', v)} />
            <TweakColor label="Accent Color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
